<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<script>
const sizes = [16, 48, 128];

sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // 背景圆角矩形
  const r = size * 0.2;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#4f46e5';
  ctx.fill();

  // 书本图标
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = Math.max(1, size * 0.06);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  const pad = size * 0.22;
  const w = size - pad * 2;
  const h = size - pad * 2;

  // 书本外框
  ctx.beginPath();
  ctx.moveTo(pad + w * 0.1, pad);
  ctx.lineTo(pad + w, pad);
  ctx.lineTo(pad + w, pad + h);
  ctx.lineTo(pad + w * 0.1, pad + h);
  ctx.quadraticCurveTo(pad, pad + h, pad, pad + h * 0.9);
  ctx.lineTo(pad, pad + h * 0.1);
  ctx.quadraticCurveTo(pad, pad, pad + w * 0.1, pad);
  ctx.stroke();

  // 横线
  const lineStart = pad + w * 0.25;
  const lineEnd = pad + w * 0.85;
  [0.4, 0.55, 0.7].forEach(ratio => {
    const y = pad + h * ratio;
    ctx.beginPath();
    ctx.moveTo(lineStart, y);
    ctx.lineTo(lineEnd, y);
    ctx.stroke();
  });

  // 下载
  const link = document.createElement('a');
  link.download = `icon${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
});
</script>
<p>Icons generated!</p>
</body>
</html>
